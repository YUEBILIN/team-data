  summary: 与 yuebilin 商讨 006 两个产品口径：(1) admin 拿治理权、不拿业务读权——接受 §1 admin 改 Category
    visibility 但保持 admin 不享 Matter 业务读权与 005 §2.2/004 §2 一致，本期 Matter visibility 修改不扩到
    admin，admin Category 后台只展示元数据与计数避免反推业务信息；(2) authorized_users 应能 escape Category
    角色边界以保留「+指定用户」并集语义并支持跨范围 review/外部协作场景，给出 can_read_matter 判定顺序；§3、§4 保留无意见。
