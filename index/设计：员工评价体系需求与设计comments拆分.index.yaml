  - created_at: '2026-05-06T22:12:45+08:00'
    body: '§3.7 末尾给的产品决策建议（"带 @ 就是 mention，没 @ 但带评价语气就是 annotation，前端拆两个按钮"）作为人类用户的入口规范没问题，但
      AI / MCP 客户端这边的决策路径没写。Claude Code 在 timeline 里看到一段评价性内容时，应该调 add_mention（带空
      targets）还是 add_annotation？


      如果不在 MCP tool description 里明写一条"评价调 annotation，提醒调 mention"，模型大概率会把"我觉得这个方案判断准"塞进
      mention.body 里——annotation 这张表长期空着，AI 派生评分层将来缺数据。


      建议 Phase 3 / Phase 6 的 MCP schema 里在两个工具的 description 顶上各加一句互斥提示，并在 add_mention
      的 description 里点明"如果只是想留评价、不需要拉特定人参与，请用 add_annotation"。'
    author: liuyu
