  - created_at: '2026-05-06T10:32:19+08:00'
    body: '今天用 MCP 跟踪 OPC matter 进度，发现一个盲点：MCP 把评论丢了。后端 /api/matters/{id} 已经返回每条 timeline
      item 的 comments 数组（含 author_display + body + mentions_display），但 server/mcp/schemas.py
      的 TimelineItem 没声明 comments 字段，pydantic 在 tool_get_matter 序列化时直接 filter 掉。结果就是
      agent 只能 add_comment 写、读不到任何评论——同事在评论区回应"解析已加"这类信息全部漏掉。


      最小修复：TimelineItem 加一行 comments: list[dict] | None = None，后端不动。


      想确认两件事：

      1. 这个修复是否在排期里？

      2. 若近期不修，xiongjianping 这边可以本地 skill 直调 REST 兜底，不阻塞；若官方版本将至，那就等你们。'
    mentions:
    - yezaiyong
    author: xiongjianping
  - created_at: '2026-05-06T10:38:35+08:00'
    body: 直接提一个新的matter，这个问题当然应该修。同时，我发现list matter这个接口没有返回matter的owner和summary，导致AI需要多次读取调用才弄得到足够的信息，这些都需要修改。
    mentions:
