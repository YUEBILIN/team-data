    body: AI 客服 S1 今天完成 dev 环境部署和端到端验证，三件事都绿： 1. 回答严格限定在上传的 KB 范围内，超出直接飞书通知负责人跟进，无幻觉
      2. 后台可维护 KB、配置通知群/频率、查看完整对话 3. 两种场景：EC 自用（第一租户身份自动注入管理后台）、普通租户（后台生成 widget 代码嵌入客户网页）
      S2-S4 规划：置信度打分 → 客户+AI+人工三角色接管 → 知识库半自动迭代 今天折腾了大半天，根因是 S1 从合并后到今天才第一次被端到端真实跑通——顺手修了
      4 个埋得较深的 bug，已全部合并 main： - sys-config：启动时文件级配置被悄悄丢弃 - CS 回复剥尾巴（"> Skills used"
      在客户场景不该看到） - CS 默认 prompt 防幻觉加固（原文引用+脑补词黑名单+自检） - pi-runner tools 空数组：Qwen/DashScope
      等严 provider 400 的根因
